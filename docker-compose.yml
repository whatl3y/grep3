services:
  # Shared infrastructure services
  docker:
    image: "docker:latest"
    privileged: true
    ports:
      - "2475:2375"
    environment:
      - DOCKER_TLS_CERTDIR=

  redis:
    image: "redis:latest"
    ports:
      - "6379:6379"

  postgres:
    image: "postgres:16"
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=grep3
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=grep3

  exec-engine-web:
    restart: always
    build:
      context: .
      dockerfile: ./apps/exec-engine/Dockerfile
    depends_on:
      - postgres
      - redis
      - docker
    ports:
      - "8000:8000"
    env_file:
      - ./apps/exec-engine/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - DOCKER_HOST=http://docker:2375
      - HOST=http://exec-engine-web:8000
      - PORT=8000
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/exec-engine/dist:/app/dist
      - ./apps/exec-engine/templates:/app/templates

  exec-engine-workers:
    restart: always
    build:
      context: .
      dockerfile: ./apps/exec-engine/Dockerfile.worker
    depends_on:
      - postgres
      - redis
      - docker
    env_file:
      - ./apps/exec-engine/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - DOCKER_HOST=http://docker:2375
      - HOST=http://exec-engine-web:8000
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/exec-engine/dist:/usr/grep3/apps/exec-engine/dist

  exec-engine-scheduler:
    restart: always
    build:
      context: .
      dockerfile: ./apps/exec-engine/Dockerfile.scheduler
    depends_on:
      - redis
    env_file:
      - ./apps/exec-engine/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=redis:6379
    volumes:
      - ./apps/exec-engine/dist:/usr/grep3/apps/exec-engine/dist

  exec-api:
    restart: always
    build:
      context: .
      dockerfile: ./apps/exec-api/Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    env_file:
      - ./apps/exec-api/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - DOCKER_HOST=http://docker:2375
      - HOST=http://exec-api:8080
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/exec-api/dist:/usr/grep3/apps/exec-api/dist

  tornado-api:
    restart: always
    build:
      context: .
      dockerfile: ./apps/tornado-api/Dockerfile
    depends_on:
      - redis
    ports:
      - "8090:8090"
    env_file:
      - ./apps/tornado-api/.env
    environment:
      - HOST=http://tornado-api:8090
      - PORT=8090
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=redis:6379
    volumes:
      - ./apps/tornado-api/dist:/usr/grep3/apps/tornado-api/dist

  remix:
    restart: always
    build:
      context: .
      dockerfile: ./apps/remix/Dockerfile
    ports:
      - "8088:8088"
    env_file:
      - ./apps/remix/.env
    environment:
      - HOST=http://remix:8088
      - PORT=8088
    volumes:
      - ./apps/remix/dist:/usr/grep3/apps/remix/dist

  merkletree-api-web:
    restart: always
    build:
      context: .
      dockerfile: ./apps/merkletree-api/Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - "8002:8002"
    env_file:
      - ./apps/merkletree-api/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - HOST=http://merkletree-api-web:8002
      - PORT=8002
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/merkletree-api/dist:/usr/grep3/apps/merkletree-api/dist

  merkletree-api-workers:
    restart: always
    build:
      context: .
      dockerfile: ./apps/merkletree-api/Dockerfile.worker
    depends_on:
      - postgres
      - redis
    env_file:
      - ./apps/merkletree-api/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - HOST=http://merkletree-api-web:8002
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/merkletree-api/dist:/usr/grep3/apps/merkletree-api/dist

  merkletree-api-scheduler:
    restart: always
    build:
      context: .
      dockerfile: ./apps/merkletree-api/Dockerfile.scheduler
    depends_on:
      - redis
    env_file:
      - ./apps/merkletree-api/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=redis:6379
    volumes:
      - ./apps/merkletree-api/dist:/usr/grep3/apps/merkletree-api/dist

  liquidity-server:
    restart: always
    build:
      context: .
      dockerfile: ./apps/liquidity/server/Dockerfile
    depends_on:
      - redis
    ports:
      - "8095:8095"
    env_file:
      - ./apps/liquidity/server/.env
    environment:
      - HOST=http://liquidity-server:8095
      - PORT=8095
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=redis:6379
      # ETH_RPC_URL is required - set in .env file or uncomment below
      # - ETH_RPC_URL=https://eth-mainnet.g.alchemy.com/v2/YOUR_API_KEY
    volumes:
      - ./apps/liquidity/server/dist:/usr/grep3/apps/liquidity/server/dist

  liquidity-client:
    restart: always
    build:
      context: .
      dockerfile: ./apps/liquidity/client/Dockerfile
    depends_on:
      - liquidity-server
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://liquidity-server:8095
    volumes:
      - ./apps/liquidity/client/dist:/app/dist

  ncaab-predict:
    restart: always
    build:
      context: ./apps/ncaab-predict
      dockerfile: Dockerfile
    ports:
      - "8096:8096"
    environment:
      - PORT=8096
    volumes:
      - ncaab-predict-data:/app/data

  prices-api:
    restart: always
    build:
      context: .
      dockerfile: ./apps/prices/Dockerfile
    depends_on:
      - redis
    ports:
      - "8097:8097"
    env_file:
      - ./apps/prices/.env
    environment:
      - HOST=http://prices-api:8097
      - PORT=8097
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=redis:6379
    volumes:
      - ./apps/prices/dist:/usr/grep3/apps/prices/dist

  crypto-news-web:
    restart: always
    build:
      context: .
      dockerfile: ./apps/crypto-news/Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - "8001:8001"
    env_file:
      - ./apps/crypto-news/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - HOST=http://crypto-news-web:8001
      - PORT=8001
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/crypto-news/dist:/usr/grep3/apps/crypto-news/dist
      - ./apps/crypto-news/views:/usr/grep3/apps/crypto-news/views
      - ./apps/crypto-news/public:/usr/grep3/apps/crypto-news/public

  crypto-news-workers:
    restart: always
    build:
      context: .
      dockerfile: ./apps/crypto-news/Dockerfile.worker
    depends_on:
      - postgres
      - redis
    env_file:
      - ./apps/crypto-news/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - HOST=http://crypto-news-web:8001
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/crypto-news/dist:/usr/grep3/apps/crypto-news/dist

  crypto-news-scheduler:
    restart: always
    build:
      context: .
      dockerfile: ./apps/crypto-news/Dockerfile.scheduler
    depends_on:
      - redis
    env_file:
      - ./apps/crypto-news/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=redis:6379
    volumes:
      - ./apps/crypto-news/dist:/usr/grep3/apps/crypto-news/dist

volumes:
  ncaab-predict-data:
    name: ncaab-predict-data