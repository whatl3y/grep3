services:
  # Shared infrastructure services
  docker:
    image: "docker:latest"
    privileged: true
    ports:
      - "2475:2375"
    environment:
      - DOCKER_TLS_CERTDIR=

  redis:
    image: "redis:latest"
    ports:
      - "6379:6379"

  postgres:
    image: "postgres:16"
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=grep3
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=grep3

  exec-engine-web:
    restart: always
    build:
      context: .
      dockerfile: ./apps/exec-engine/Dockerfile
    depends_on:
      - postgres
      - redis
      - docker
    ports:
      - "8000:8000"
    env_file:
      - ./apps/exec-engine/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - DOCKER_HOST=http://docker:2375
      - HOST=http://exec-engine-web:8000
      - PORT=8000
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/exec-engine/dist:/usr/grep3/apps/exec-engine/dist

  exec-engine-workers:
    restart: always
    build:
      context: .
      dockerfile: ./apps/exec-engine/Dockerfile.worker
    depends_on:
      - postgres
      - redis
      - docker
    env_file:
      - ./apps/exec-engine/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - DOCKER_HOST=http://docker:2375
      - HOST=http://exec-engine-web:8000
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/exec-engine/dist:/usr/grep3/apps/exec-engine/dist

  exec-engine-scheduler:
    restart: always
    build:
      context: .
      dockerfile: ./apps/exec-engine/Dockerfile.scheduler
    depends_on:
      - redis
    env_file:
      - ./apps/exec-engine/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=redis:6379
    volumes:
      - ./apps/exec-engine/dist:/usr/grep3/apps/exec-engine/dist

  exec-api:
    restart: always
    build:
      context: .
      dockerfile: ./apps/exec-api/Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    env_file:
      - ./apps/exec-api/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - DOCKER_HOST=http://docker:2375
      - HOST=http://exec-api:8080
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/exec-api/dist:/usr/grep3/apps/exec-api/dist

  tornado-api:
    restart: always
    build:
      context: ./apps/tornado-api
      dockerfile: ./Dockerfile
    depends_on:
      - redis
    ports:
      - "8090:8090"
    env_file:
      - ./apps/tornado-api/.env
    environment:
      - HOST=http://tornado-api:8090
      - PORT=8090
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=redis:6379
    volumes:
      - ./apps/tornado-api/dist:/usr/tornado-api/dist

  merkletree-api-web:
    restart: always
    build:
      context: .
      dockerfile: ./apps/merkletree-api/Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - "8002:8002"
    env_file:
      - ./apps/merkletree-api/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - HOST=http://merkletree-api-web:8002
      - PORT=8002
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/merkletree-api/dist:/usr/grep3/apps/merkletree-api/dist

  merkletree-api-workers:
    restart: always
    build:
      context: .
      dockerfile: ./apps/merkletree-api/Dockerfile.worker
    depends_on:
      - postgres
      - redis
    env_file:
      - ./apps/merkletree-api/.env
    environment:
      - DATABASE_URL=postgres://postgres:grep3@postgres:5432/grep3
      - HOST=http://merkletree-api-web:8002
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=postgres:5432,redis:6379
    volumes:
      - ./apps/merkletree-api/dist:/usr/grep3/apps/merkletree-api/dist

  merkletree-api-scheduler:
    restart: always
    build:
      context: .
      dockerfile: ./apps/merkletree-api/Dockerfile.scheduler
    depends_on:
      - redis
    env_file:
      - ./apps/merkletree-api/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - WAIT_HOSTS=redis:6379
    volumes:
      - ./apps/merkletree-api/dist:/usr/grep3/apps/merkletree-api/dist
